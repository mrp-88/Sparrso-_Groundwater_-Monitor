<style>
:root{
  --bg:#f4f6f8;--bg-2:#ffffff;--ink:#0b1f33;--ink-2:#33465c;--ink-3:#6b7a8f;--ink-4:#98a4b5;
  --line:#d9dee5;--line-2:#e8ecf1;--accent:#0b2545;--accent-2:#0057a7;--cyan:#00809d;--cyan-2:#00a7c4;
  --ok:#177245;--warn:#b36b00;--bad:#a01a1a;--bad-2:#c63b3b;--good-2:#2a8a4f;
  --panel:#ffffff;--chip:#eef2f6;--hover:#f0f4f8;
  --font:'IBM Plex Sans','Segoe UI',sans-serif;--mono:'IBM Plex Mono',monospace;--serif:'IBM Plex Serif',serif;
  --rad:6px;--rad-sm:4px;--shadow:0 1px 0 rgba(11,31,51,.04),0 1px 3px rgba(11,31,51,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
::selection{background:#cfe4f3;color:var(--ink)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c7cfd9;border:2px solid var(--bg);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:#a8b3c2}
a{color:var(--accent-2);text-decoration:none}a:hover{text-decoration:underline}
button,select,input{font-family:inherit;color:inherit}
button{cursor:pointer}
select:focus,input:focus,button:focus-visible{outline:2px solid var(--cyan-2);outline-offset:1px}

/* Leaflet overrides — government-map style */
.leaflet-container{background:#e8ecef!important;font-family:var(--font)!important}
.leaflet-control-zoom a{background:#fff!important;color:var(--ink)!important;border:1px solid var(--line)!important;font-family:var(--font)!important;font-weight:500!important}
.leaflet-control-zoom a:hover{background:var(--hover)!important}
.leaflet-control-attribution{background:rgba(255,255,255,.9)!important;color:var(--ink-3)!important;font-size:10px!important;padding:2px 6px!important;border-radius:3px 0 0 0!important}
.leaflet-popup-content-wrapper{background:#fff!important;color:var(--ink)!important;border-radius:var(--rad)!important;border:1px solid var(--line)!important;box-shadow:0 4px 16px rgba(11,31,51,.12)!important}
.leaflet-popup-tip{background:#fff!important;border:1px solid var(--line)!important}
.leaflet-popup-content{margin:10px 14px!important;font-family:var(--font)!important}

/* Floating map panels */
.map-panel{position:absolute;z-index:650;background:rgba(255,255,255,.97);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:var(--rad);padding:10px 12px;box-shadow:var(--shadow)}
.map-panel .h{font-size:9px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin:8px 0 5px;padding-top:7px;border-top:1px solid var(--line-2)}
.map-panel .h:first-child{margin-top:0;padding-top:0;border-top:none}
.map-panel label{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-2);padding:2px 0;cursor:pointer;line-height:1.4}
.map-panel label:hover{color:var(--accent-2)}
.map-panel input[type=radio],.map-panel input[type=checkbox]{accent-color:var(--accent-2);width:12px;height:12px;cursor:pointer}
.map-panel select{background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:var(--rad-sm);padding:3px 6px;font-size:11px}

/* Gov-style cards */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);box-shadow:var(--shadow)}
.card-h{padding:10px 14px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-t{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.card-b{padding:14px}
.mono{font-family:var(--mono)}
.serif{font-family:var(--serif)}

/* Pills / chips */
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;font-size:10.5px;font-weight:600;border-radius:3px;background:var(--chip);color:var(--ink-2);border:1px solid var(--line-2)}
.chip-ok{background:#e6f2ec;color:var(--ok);border-color:#c5dfd1}
.chip-bad{background:#fbe9e9;color:var(--bad);border-color:#f1c5c5}
.chip-warn{background:#fdf1e0;color:var(--warn);border-color:#f2d9ae}

/* Gov header stripe */
.gov-stripe{height:3px;background:linear-gradient(90deg,var(--accent) 0%,var(--accent) 35%,var(--cyan) 35%,var(--cyan) 65%,#d52b1e 65%,#d52b1e 100%)}
.official-flag{display:inline-block;width:10px;height:7px;background:linear-gradient(to right,#006a4e 50%,#006a4e 50%),radial-gradient(circle at 42% 50%,#f42a41 3.5px,transparent 3.5px);background:#006a4e;position:relative;border-radius:1px;vertical-align:middle;margin-right:6px}
.official-flag:after{content:"";position:absolute;left:42%;top:50%;transform:translate(-50%,-50%);width:4.5px;height:4.5px;background:#f42a41;border-radius:50%}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease-out both}
.btn{background:var(--accent);color:#fff;border:none;border-radius:var(--rad);padding:8px 16px;font-size:12.5px;font-weight:600;letter-spacing:.2px;transition:background .15s}
.btn:hover{background:#0a1d38}
.btn-g{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn-g:hover{background:var(--hover)}
.btn-sm{padding:5px 10px;font-size:11px}

/* tabs */
.tab{padding:9px 14px;border:none;background:transparent;color:var(--ink-3);font-size:12.5px;font-weight:500;border-bottom:2px solid transparent;transition:color .15s}
.tab:hover{color:var(--ink-2)}
.tab.active{color:var(--accent);font-weight:600;border-bottom-color:var(--accent)}

/* Equation box */
.eq-box{background:#fbfbfd;border:1px solid var(--line-2);border-radius:var(--rad-sm);padding:10px 12px;font-family:var(--serif);font-size:13.5px;color:var(--ink);line-height:1.7;word-break:break-word}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px dashed var(--line-2);font-size:12px}
.stat-row:last-child{border-bottom:none}
.stat-lbl{color:var(--ink-3);font-weight:500}
.stat-val{font-family:var(--mono);font-weight:600;color:var(--ink)}

/* Responsive */
@media(max-width:1100px){.map-panel{max-width:220px}}
@media(max-width:900px){.grid-2{grid-template-columns:1fr!important}.grid-3{grid-template-columns:1fr!important}.hide-md{display:none}}
</style>

function lerp(c1,c2,t){var a=parseInt(c1.slice(1,3),16),b=parseInt(c1.slice(3,5),16),c=parseInt(c1.slice(5,7),16),d=parseInt(c2.slice(1,3),16),e=parseInt(c2.slice(3,5),16),f=parseInt(c2.slice(5,7),16);return[Math.round(a+(d-a)*t),Math.round(b+(e-b)*t),Math.round(c+(f-c)*t)]}
function v2rgb(v,ly){var p=ly.pal,rng=ly.max-ly.min,n=Math.max(0,Math.min(1,(v-ly.min)/rng)),i=n*(p.length-1),lo=Math.floor(i),hi=Math.min(lo+1,p.length-1);return lerp(p[lo],p[hi],i-lo)}

var BD={latMin:20.5,latMax:26.7,lngMin:87.9,lngMax:92.8};
var RW=520,RH=Math.round(RW*(BD.latMax-BD.latMin)/(BD.lngMax-BD.lngMin));

function inBD(lat,lng){
  if(lat<20.6||lat>26.65||lng<88.0||lng>92.7)return false;
  if(lat<21.0&&lng<89.5)return false;
  if(lat<21.5&&lng<88.5)return false;
  if(lng<88.1&&lat>24.5)return false;
  if(lng<88.3&&lat<23.0)return false;
  return true;
}

// Polygon helpers for precise admin-boundary clipping ────────────────────────
function polysForDistricts(names){
  var out=[];if(!GEO_OK)return out;
  names.forEach(function(n){var ps=GEO.polys[n];if(ps)ps.forEach(function(poly){out.push(poly)})});
  return out; // array of polygons; each polygon = array of flat rings [lng,lat,lng,lat,...]
}
function geoBBox(polys){
  var laMin=99,laMax=-99,loMin=999,loMax=-999;
  polys.forEach(function(poly){poly.forEach(function(ring){
    for(var i=0;i<ring.length;i+=2){var lo=ring[i],la=ring[i+1];
      if(lo<loMin)loMin=lo;if(lo>loMax)loMax=lo;if(la<laMin)laMin=la;if(la>laMax)laMax=la;}
  })});
  return{latMin:laMin,latMax:laMax,lngMin:loMin,lngMax:loMax};
}
function clipPath(ctx,polys){
  ctx.beginPath();
  polys.forEach(function(poly){poly.forEach(function(ring){
    for(var i=0;i<ring.length;i+=2){
      var px=(ring[i]-BD.lngMin)/(BD.lngMax-BD.lngMin)*RW,
          py=(BD.latMax-ring[i+1])/(BD.latMax-BD.latMin)*RH;
      if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    }
    ctx.closePath();
  })});
}

// RASTER RENDERER — IDW field, clipped to admin polygons via canvas path ───────
function mkRaster(ad,ly,yr,mo,clipPolys){
  var cv=document.createElement("canvas");cv.width=RW;cv.height=RH;
  var ctx=cv.getContext("2d");
  var tmp=document.createElement("canvas");tmp.width=RW;tmp.height=RH;
  var tctx=tmp.getContext("2d"),img=tctx.createImageData(RW,RH),px=img.data;
  var pts=[];for(var i=0;i<ad.length;i++){var c=DC[ad[i].district];if(c)pts.push({lat:c[0],lng:c[1],val:gv(ad[i],ly,yr,mo)})}
  // restrict IDW computation to clip bounding box (big speedup for district clips)
  var x0=0,y0=0,x1=RW,y1=RH;
  if(clipPolys&&clipPolys.length){
    var bb=geoBBox(clipPolys);
    x0=Math.max(0,Math.floor((bb.lngMin-BD.lngMin)/(BD.lngMax-BD.lngMin)*RW)-2);
    x1=Math.min(RW,Math.ceil((bb.lngMax-BD.lngMin)/(BD.lngMax-BD.lngMin)*RW)+2);
    y0=Math.max(0,Math.floor((BD.latMax-bb.latMax)/(BD.latMax-BD.latMin)*RH)-2);
    y1=Math.min(RH,Math.ceil((BD.latMax-bb.latMin)/(BD.latMax-BD.latMin)*RH)+2);
  }
  for(var py=y0;py<y1;py++){
    var lat=BD.latMax-(py/RH)*(BD.latMax-BD.latMin);
    for(var pxx=x0;pxx<x1;pxx++){
      var lng=BD.lngMin+(pxx/RW)*(BD.lngMax-BD.lngMin),off=(py*RW+pxx)*4;
      var ws=0,vs=0;
      for(var k=0;k<pts.length;k++){
        var dl=lat-pts[k].lat,dn=lng-pts[k].lng,d2=dl*dl+dn*dn;
        if(d2<.0001){ws=1;vs=pts[k].val;break}
        var w=1/Math.pow(d2,1.4);ws+=w;vs+=w*pts[k].val;
      }
      var val=ws>0?vs/ws:0,rgb=v2rgb(val,ly);
      px[off]=rgb[0];px[off+1]=rgb[1];px[off+2]=rgb[2];px[off+3]=235;
    }
  }
  tctx.putImageData(img,0,0);
  if(clipPolys&&clipPolys.length){
    ctx.save();clipPath(ctx,clipPolys);ctx.clip("evenodd");ctx.drawImage(tmp,0,0);ctx.restore();
  }else{
    ctx.drawImage(tmp,0,0);
  }
  return cv.toDataURL("image/png");
}

function Chart(p){

  if(!data||!data.length)return null;
  var av=[];keys.forEach(function(k){data.forEach(function(d){av.push(d[k])})});
  if(reg){av.push(reg.slope*data[0].year+reg.intercept);av.push(reg.slope*data[data.length-1].year+reg.intercept)}
  var mn=Math.min.apply(null,av),mx=Math.max.apply(null,av),rn=mx-mn||1;
  var P={t:24,r:18,b:38,l:46},cW=w-P.l-P.r,cH=ht-P.t-P.b;
  function gX(i){return P.l+(i/(data.length-1))*cW}
  function gY(v){return P.t+cH-((v-mn)/rn)*cH}
  var el=[];
  if(title) el.push(h("text",{key:"t",x:w/2,y:14,textAnchor:"middle",fill:"#33465c",fontSize:11,fontWeight:600,fontFamily:"'IBM Plex Sans',sans-serif"},title));
  // Gridlines
  [0,.25,.5,.75,1].forEach(function(f,i){
    var v=mn+rn*f;
    el.push(h("line",{key:"g"+i,x1:P.l,x2:w-P.r,y1:gY(v),y2:gY(v),stroke:"#e8ecf1",strokeWidth:1}));
    el.push(h("text",{key:"v"+i,x:P.l-5,y:gY(v)+3,textAnchor:"end",fill:"#98a4b5",fontSize:9,fontFamily:"'IBM Plex Mono',monospace"},v.toFixed(1)));
  });
  // Zero line
  if(mn<0&&mx>0) el.push(h("line",{key:"z",x1:P.l,x2:w-P.r,y1:gY(0),y2:gY(0),stroke:"#6b7a8f",strokeWidth:1,strokeDasharray:"4,3",opacity:.8}));
  // Data lines
  keys.forEach(function(key,ki){
    var pts=data.map(function(d,i){return{x:gX(i),y:gY(d[key])}});
    var ln=pts.map(function(pt,i){return(i===0?"M":"L")+pt.x+","+pt.y}).join(" ");
    if(af) el.push(h("path",{key:"a"+ki,d:ln+" L"+pts[pts.length-1].x+","+(P.t+cH)+" L"+pts[0].x+","+(P.t+cH)+" Z",fill:colors[ki],opacity:.08}));
    el.push(h("path",{key:"l"+ki,d:ln,fill:"none",stroke:colors[ki],strokeWidth:2,strokeLinejoin:"round",strokeLinecap:"round"}));
    if(dots) pts.forEach(function(pt,i){if(i%Math.max(1,Math.floor(pts.length/20))===0) el.push(h("circle",{key:"d"+ki+"_"+i,cx:pt.x,cy:pt.y,r:2.5,fill:"#fff",stroke:colors[ki],strokeWidth:1.6}))});
  });
  // OLS regression overlay
  if(reg){
    var x1=data[0].year,x2=data[data.length-1].year;
    var y1=reg.slope*x1+reg.intercept,y2=reg.slope*x2+reg.intercept;

  }

  // so dense monthly series don't stack duplicate labels into a smudge.
  var seenYr={};
  data.forEach(function(d,i){
    if(!d.year)return;var yr=Math.floor(d.year);
    if(yr%4!==0||seenYr[yr])return;seenYr[yr]=1;
    el.push(h("text",{key:"x"+i,x:gX(i),y:ht-6,textAnchor:"middle",fill:"#6b7a8f",fontSize:9,fontFamily:"'IBM Plex Mono',monospace"},yr));
  });
  var _ld=data[data.length-1];
  if(_ld&&_ld.year){var _ly=Math.floor(_ld.year);if(!seenYr[_ly])el.push(h("text",{key:"xl",x:gX(data.length-1),y:ht-6,textAnchor:"middle",fill:"#6b7a8f",fontSize:9,fontFamily:"'IBM Plex Mono',monospace"},_ly))}
  // Legend
  if(labels) labels.forEach(function(l,i){
    el.push(h("g",{key:"lg"+i,transform:"translate("+(P.l+i*100)+","+(ht-22)+")"},
      h("line",{x1:0,x2:14,y1:0,y2:0,stroke:colors[i],strokeWidth:2}),

  });

    ));
  }
  return h("svg",{width:"100%",viewBox:"0 0 "+w+" "+ht,style:{display:"block"},preserveAspectRatio:"xMidYMid meet"},el);
}

var GC='// GRACE / GLDAS Groundwater Storage Monitoring — Bangladesh\n// All 64 districts (FAO GAUL Admin Level 2)\n// Author: Mashiyat Raunaq Preetom · SPARRSO / BUP\n// Repository: github.com/raunaqpreetom88/GW-Monitor-Bangladesh\n\nvar gaul2 = ee.FeatureCollection("FAO/GAUL/2015/level2");\nvar bd = gaul2.filter(ee.Filter.eq(\'ADM0_NAME\', \'Bangladesh\'));\nMap.centerObject(bd, 7);\n\nvar startDate = \'2003-01-01\', endDate = \'2025-12-31\';\nvar baseStart = \'2004-01-01\', baseEnd = \'2009-12-31\';\n\n// ─── Data ────────────────────────────────────────────────────\nvar grace = ee.ImageCollection("NASA/GRACE/MASS_GRIDS/MASCON_CRI")\n  .select(\'lwe_thickness\').filterDate(startDate, endDate);\n\nvar gldas = ee.ImageCollection("NASA/GLDAS/V021/NOAH/G025/T3H")\n  .filterDate(startDate, endDate)\n  .select([\'SoilMoi0_10cm_inst\',\'SoilMoi10_40cm_inst\',\n           \'SoilMoi40_100cm_inst\',\'SoilMoi100_200cm_inst\',\n           \'SWE_inst\',\'CanopInt_inst\',\'Qs_acc\',\'Qsb_acc\']);\n\n// ─── Monthly GLDAS composites (cm) ───────────────────────────\nvar months = ee.List.sequence(0,\n  ee.Date(endDate).difference(ee.Date(startDate),\'month\').int());\n\nvar gldasMonthly = ee.ImageCollection(months.map(function(m){\n  var d = ee.Date(startDate).advance(m,\'month\');\n  var imgs = gldas.filterDate(d, d.advance(1,\'month\'));\n  var sm = imgs.select([\'SoilMoi0_10cm_inst\',\'SoilMoi10_40cm_inst\',\n    \'SoilMoi40_100cm_inst\',\'SoilMoi100_200cm_inst\'])\n    .mean().reduce(ee.Reducer.sum()).divide(10).rename(\'SM\');\n  var swe = imgs.select(\'SWE_inst\').mean().divide(10).rename(\'SWE\');\n  var can = imgs.select(\'CanopInt_inst\').mean().divide(10).rename(\'CAN\');\n  var sw  = imgs.select([\'Qs_acc\',\'Qsb_acc\']).mean()\n    .reduce(ee.Reducer.sum()).divide(10).rename(\'SW\');\n  return sm.addBands(swe).addBands(can).addBands(sw)\n    .set(\'system:time_start\', d.millis());\n}));\n\n// ─── Baseline (2004–2009) ────────────────────────────────────\nvar baseTWS = grace.filterDate(baseStart,baseEnd).mean();\nvar baseSM  = gldasMonthly.filterDate(baseStart,baseEnd).select(\'SM\').mean();\nvar baseSWE = gldasMonthly.filterDate(baseStart,baseEnd).select(\'SWE\').mean();\nvar baseCAN = gldasMonthly.filterDate(baseStart,baseEnd).select(\'CAN\').mean();\nvar baseSW  = gldasMonthly.filterDate(baseStart,baseEnd).select(\'SW\').mean();\n\n// ─── Water balance: ΔGWS = ΔTWS − ΔSM − ΔSWE − ΔCAN − ΔSW ────\nvar gwsCollection = grace.map(function(img){\n  var d = img.date();\n  var gl = gldasMonthly.filterDate(\n    d.advance(-15,\'day\'), d.advance(15,\'day\')).first();\n  var dTWS = img.subtract(baseTWS).rename(\'dTWS\');\n  var dSM  = gl.select(\'SM\').subtract(baseSM).rename(\'dSM\');\n  var dSWE = gl.select(\'SWE\').subtract(baseSWE).rename(\'dSWE\');\n  var dCAN = gl.select(\'CAN\').subtract(baseCAN).rename(\'dCAN\');\n  var dSW  = gl.select(\'SW\').subtract(baseSW).rename(\'dSW\');\n  var dGWS = dTWS.subtract(dSM).subtract(dSWE).subtract(dCAN).subtract(dSW).rename(\'dGWS\');\n  return dTWS.addBands(dSM).addBands(dSWE).addBands(dCAN).addBands(dSW).addBands(dGWS)\n    .set(\'system:time_start\', d.millis());\n});\n\n// ─── Sen\'s slope trend (annualised) ──────────────────────────\nvar gwsTrend = gwsCollection.select(\'dGWS\')\n  .reduce(ee.Reducer.sensSlope())\n  .select(\'slope\').multiply(12)\n  .rename(\'GWS_trend_cm_yr\');\n\n// ─── Visualisation ───────────────────────────────────────────\nMap.addLayer(gwsTrend.clip(bd),\n  {min:-1.2, max:0.6,\n   palette:[\'#8b0000\',\'#d7191c\',\'#fdae61\',\'#ffffbf\',\'#a6d96a\',\'#1a9641\',\'#00441b\']},\n  \'GWS Sen\\\'s Slope (cm/yr)\');\n\n// ─── Per-district export ─────────────────────────────────────\nvar districtTrends = gwsTrend.reduceRegions({\n  collection: bd, reducer: ee.Reducer.mean(), scale: 25000});\n\nExport.table.toDrive({\n  collection: districtTrends,\n  description: \'BD_GWS_SensSlope_2003_2025\',\n  fileFormat: \'CSV\'});';

      n=Math.max(0,Math.min(1,(r||0)/300)),i=n*(pal.length-1),lo=Math.floor(i);
  return pal[Math.min(lo,pal.length-1)];
}
